<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobby Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <form id="captureForm" class="form-stack">
      <label class="field">
        <span>Job Title</span>
        <input id="jobTitle" type="text" required>
      </label>

      <label class="field">
        <span>Company</span>
        <input id="companyName" type="text" required>
      </label>

      <label class="field">
        <span>Location</span>
        <input id="location" type="text">
      </label>

      <input id="jobUrl" type="hidden">

      <label class="field">
        <span>Description</span>
        <textarea id="jobDescription" rows="7"></textarea>
      </label>

      <div class="button-row">
        <button type="button" id="refillBtn" class="secondary">Refill</button>
        <button type="button" id="saveBtn" class="primary">Save Job</button>
      </div>

      <button type="button" id="saveGenerateBtn" class="generate">Generate Letter</button>
    </form>

    <p id="status" class="status" aria-live="polite"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
